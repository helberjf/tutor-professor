services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kids_tutor
      POSTGRES_USER: kids_tutor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kids_tutor_secret}
    ports:
      # Keep host port 5432 free for other local PostgreSQL projects.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - english_kids_tutor_postgres_data:/var/lib/postgresql/data
    networks:
      - kids-tutor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kids_tutor"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports:
      - "8001:8001"
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://kids_tutor:${POSTGRES_PASSWORD:-kids_tutor_secret}@db:5432/kids_tutor
    volumes:
      - ./apps/api/audio_cache:/app/audio_cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kids-tutor-net

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    depends_on:
      - api
    networks:
      - kids-tutor-net

  # Optional local Kokoro TTS server
  # kokoro-tts:
  #   image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.1.4
  #   ports:
  #     - "8880:8880"
  #   networks:
  #     - kids-tutor-net

  # Cloudflare Tunnel (requires configuration)
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   networks:
  #     - kids-tutor-net

volumes:
  english_kids_tutor_postgres_data:

networks:
  kids-tutor-net:
    driver: bridge
